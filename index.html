<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Koala Studio — Sites, Software & Design que abraçam seu negócio</title>
    <meta name="description" content="Criamos sites, softwares locais, landing pages, UI/UX e posts para Instagram. Design bonito, código limpo e entregas rápidas. Atendemos em todo o Brasil." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://koala.studio/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://koala.studio/" />
    <meta property="og:title" content="Koala Studio — Sites, Software & Design" />
    <meta property="og:description" content="Sites, softwares locais, landing pages, UI/UX e posts para Instagram. Design bonito, código limpo, entregas rápidas." />
    <meta property="og:locale" content="pt_BR" />
    <meta property="og:site_name" content="Koala Studio" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Koala Studio — Sites, Software & Design" />
    <meta name="twitter:description" content="Sites, softwares locais, landing pages, UI/UX e posts para Instagram." />

    <!-- Theme -->
    <meta name="theme-color" content="#f7f6f0" />

    <!-- Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!--
      Carrega fonte de forma NÃO-BLOQUEANTE via media="print" trick.
      Isso remove os 300ms de render-blocking que travavam o FCP/LCP.
    -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Koala Studio",
      "description": "Criamos sites, softwares locais, landing pages, UI/UX e posts para Instagram.",
      "url": "https://koala.studio",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "São Carlos",
        "addressRegion": "SP",
        "addressCountry": "BR"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "ola@koala.studio"
      },
      "areaServed": "BR",
      "serviceType": ["Web Design", "Web Development", "Software Development", "UI/UX Design", "Social Media"]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
